schema: spec-driven

context: |
  This repository is the SpecOps Overlay core for OpenSpec. It adds quality
  gates, AC proof matrices, and structured evaluation around the standard
  OpenSpec proposal/spec/design/task/apply/archive lifecycle. It is not a
  runnable service by itself.

  Overlay identity:
  - The repository root is the technology-agnostic overlay core. Do not create
    or assume a nested core/ directory.
  - OpenSpec organizes change artifacts. SpecOps Overlay adds project context,
    pre-implementation quality gates, acceptance-criteria proof planning,
    hidden-requirement review, scope discipline, and post-implementation
    scoring with evidence.
  - Stack-specific guidance is maintained in source flavors under flavors/<id>/.
    Adoption installs it under openspec/specops/flavors/<id>/. Java/Quarkus is
    the first supported flavor, not a prerequisite for adopting the overlay
    core.
  - Generic adoption must not assume any language, framework, build tool,
    database, runtime platform, container engine, or cloud provider.

  Overlay adoption:
  - Fill AGENTS.md and docs/project/* with real facts in the adopting
    repository before relying on agents for implementation work.
  - Generate tool-specific OpenSpec command files with `openspec init` in the
    adopting repository.
  - Keep generated tool integrations such as .claude/ and
    .github/prompts/opsx-* out of this repository unless a consuming team
    explicitly chooses to version them.

  Project reference docs:
  - docs/project/ARCHITECTURE.md: architecture, boundaries, ownership, runtime shape.
  - docs/project/STACK.md: language, frameworks, build, deployment, required tooling.
  - docs/project/STRUCTURE.md: repository layout, modules, generated files, ownership.
  - docs/project/CONVENTIONS.md: coding, naming, API, data, logging, review conventions.
  - docs/project/TESTING.md: build, test, static analysis, and migration validation commands.
  - docs/project/INTEGRATIONS.md: external systems, contracts, credentials, local dependencies.
  - docs/project/CONCERNS.md: known risks, constraints, tradeoffs, and operational concerns.

  AGENTS.md is the agent contract for working in the repository. Do not copy it
  here wholesale. Use this OpenSpec config as the context bridge for proposals,
  specs, designs, and tasks.

  OpenSpec ownership:
  - Current observable behavior belongs in openspec/specs/.
  - Proposed behavior changes belong in openspec/changes/.
  - Engineering context belongs in docs/project/.
  - Repo-local agent skills belong in `.agents/skills/`.
  - SpecOps templates and flavor assets belong in `openspec/specops/`.
  - Stack-specific coding, integration, and hardening patterns belong in the
    appropriate flavor under openspec/specops/flavors/<id>/docs/.
  - Tool-specific command files are generated by OpenSpec, not maintained as
    overlay source.

  Change sizing:
  - Small maintenance changes may use a direct diff when OpenSpec traceability
    adds no useful proof.
  - Behavior changes may use lighter OpenSpec artifacts, but must preserve
    openspec/changes/ tracking, traceability, validation evidence, and
    sync/archive expectations when they enter the OpenSpec workflow.
  - Medium changes use proposal/spec/task artifacts as needed for one bounded
    behavior or template update.
  - Large and complex changes use full proposal/spec/design/task/proof
    artifacts and quality gates.
  - Risky surfaces still trigger quality gates regardless of size.

  Conditional skill gates:
  - Use .agents/skills/brownfield-mapping/SKILL.md when adopting SpecOps Overlay in an
    existing repository or when docs/project/* must be filled from observed
    brownfield code, manifests, scripts, and CI.
  - Use the selected flavor architecture skill, such as
    openspec/specops/flavors/java-quarkus/skills/modular-architecture/SKILL.md, only when a
    change affects modules, boundaries, facades, repositories, persistence
    ownership, or subdomains and the selected flavor provides one.
  - Use .agents/skills/spec-quality-gate/SKILL.md before implementation when a change
    has explicit acceptance criteria, hidden requirement risk, external
    integrations, persistence, messaging, security, config, async behavior, or
    webhook behavior that needs AC-to-proof planning.
  - Use .agents/skills/spec-driven-eval/SKILL.md after implementation when acceptance
    criteria are clear enough to score with file/line evidence.
  - Use .agents/skills/pr-review/SKILL.md only for explicit PR, branch, or diff review.

rules:
  proposal:
    - Identify which docs/project reference files are relevant to the change.
    - Inspect openspec/specs/ for existing canonical capability names before
      naming delta specs.
    - Use New Capabilities, Modified Capabilities, and Removed Capabilities to
      describe the capability contract.
    - Map each capability to openspec/changes/<change-id>/specs/<capability>/spec.md.
    - State whether stack-specific flavor guidance is relevant, and name the
      flavor only when the adopting repository actually uses it.
    - State whether the change affects observable behavior that must be represented in specs.
    - Identify whether the change has explicit ACs, hidden requirement risk,
      external integrations, persistence, messaging, security, config, async
      behavior, or webhook behavior.
    - Document known out-of-scope behavior early, especially roadmap or future-slice items.
    - Size the change as small, medium, large, or complex, and justify any
      lighter artifact path.
    - State whether .agents/skills/spec-quality-gate/SKILL.md should run before implementation.
    - For explicit ACs, persistence, messaging, external integration, security,
      config, async, scheduled, or webhook behavior, make
      .agents/skills/spec-quality-gate/SKILL.md default-on unless an opt-out rationale
      is recorded.
    - Call out risks or constraints from docs/project/CONCERNS.md when relevant.
    - If docs/project/* are still placeholders in an existing repository, run
      .agents/skills/brownfield-mapping/SKILL.md before relying on them for decisions.
  specs:
    - Capture externally observable behavior, requirements, and scenarios.
    - Do not use specs as a dumping ground for stack, architecture, or repository notes.
    - "Use `### Requirement: <name>` for every requirement."
    - Give requirements and acceptance criteria stable IDs or labels suitable for traceability.
    - Record priority when it affects implementation, rollout, or validation order.
    - Mark explicitly out-of-scope behavior when the source PRD includes roadmap or future-slice items.
    - "Use `#### Scenario: <name>` for every scenario."
    - Include at least one scenario per requirement.
    - Use SHALL or MUST for normative requirements.
    - Prefer behavior-first language over implementation details such as class names, methods, tables, or framework specifics.
    - Use Given/When/Then scenarios when behavior can be expressed that way.
  design:
    - Align design decisions with docs/project/ARCHITECTURE.md and docs/project/CONVENTIONS.md.
    - Reference docs/project/INTEGRATIONS.md for external systems and runtime dependencies.
    - When relevant, record decisions for validation, idempotency, authorization,
      identity boundaries, concurrency, external dependency failures, typed
      errors, observability, privacy, data consistency, async completion, and rollback.
    - For webhook, scheduled, message-driven, or async flows, name the observable final
      outcome that tests must assert.
    - Resolve ambiguous AC interpretation before task execution, freeze the
      smallest defensible assumption, or mark the AC unknown/blocked.
    - Keep framework and implementation details in design; keep behavior requirements in specs.
    - Keep stack assumptions out of core workflow artifacts unless a selected
      flavor or project reference doc justifies them.
    - If the change affects modules, boundaries, facades, repositories, persistence ownership, or subdomains, load the selected flavor architecture skill, such as openspec/specops/flavors/java-quarkus/skills/modular-architecture/SKILL.md, and include its boundary decisions in the design.
    - Explain any intentional conflict with the project reference docs.
  tasks:
    - Include validation steps from docs/project/TESTING.md when code changes are planned.
    - Use stack-specific hardening patterns from the flavor docs when a change affects formatting, static analysis, CI hardening, or validation harness gates.
    - If a flavor architecture skill was used for design, include architecture verification tasks from that skill, such as openspec/specops/flavors/java-quarkus/skills/modular-architecture/references/verification.md.
    - Map implementation tasks and proof tasks to stable requirement or AC IDs.
    - Implementation tasks must include task-local Tests, Gate, Done when, and
      Maps to fields.
    - Tests must map to ACs, sanctioned implicit risks, or documented
      engineering gates.
    - Every planned file, endpoint, job, event, config entry, and test must map
      to an AC, sanctioned implicit risk, or documented engineering gate before
      implementation.
    - For code-changing tasks, write or update the smallest appropriate
      failing test first, confirm failure when feasible, then implement the
      smallest passing change.
    - Do not delete, skip, weaken, or lower the scope of tests merely to pass
      validation; exceptions require explicit rationale and AC/risk/gate
      mapping.
    - Use validation gates quick, full, build, docs, security, OpenSpec verify,
      or evaluation to make proof scope explicit.
    - Prefer one focused Conventional Commit per non-trivial implementation
      task when the repository workflow allows it.
    - Include unit-test tasks for service/domain business rules.
    - Include integration/e2e proof tasks for observable behavior, persistence,
      transactions, messaging, external clients, security, and config.
    - Include real-outcome proof for async, scheduled, message-driven, or webhook behavior.
    - If acceptance criteria are explicit, include a post-implementation spec-driven evaluation task using .agents/skills/spec-driven-eval/SKILL.md before archive or merge.
    - Run /opsx:verify before .agents/skills/spec-driven-eval/SKILL.md when the
      expanded profile is available; if unavailable, record that status and run
      openspec validate <change-id> or equivalent generated structural review.
    - Do not archive until specs are synced or explicitly archive-ready,
      evaluation evidence is recorded, and unresolved gaps are named.
    - Add documentation update tasks when project reference docs need to change.
    - Keep tasks small enough to verify independently.
    - Record while-here ideas as deferred or out of scope unless they map to an
      AC, sanctioned implicit risk, or engineering gate.
